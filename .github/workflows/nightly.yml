name: Nightly Visual QA

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC every night
  workflow_dispatch:     # allow manual runs from the Actions tab

jobs:
  visual-qa:
    name: Screenshot → Claude Vision → Auto-fix PRs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore auth state
        env:
          AUTH_STATE: ${{ secrets.AUTH_STATE }}
        run: |
          if [ -n "$AUTH_STATE" ]; then
            mkdir -p auth
            echo "$AUTH_STATE" | base64 -d > auth/state.json
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run DB migration
        run: pnpm migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Debug — check secrets are set
        run: |
          echo "BASE_URL set:            ${{ secrets.BASE_URL != '' }}"
          echo "ANTHROPIC_API_KEY set:   ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "DATABASE_URL set:        ${{ secrets.DATABASE_URL != '' }}"
          echo "UI_FIX_GITHUB_TOKEN set: ${{ secrets.UI_FIX_GITHUB_TOKEN != '' }}"
          echo "REPO_OWNER: ${{ vars.REPO_OWNER }}"
          echo "REPO_NAME:  ${{ vars.REPO_NAME }}"

      - name: Run visual tests + auto-fix
        run: pnpm test:ci
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UI_FIX_GITHUB_TOKEN: ${{ secrets.UI_FIX_GITHUB_TOKEN }}
          REPO_OWNER: ${{ vars.REPO_OWNER }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          REPO_BRANCH: ${{ vars.REPO_BRANCH || 'main' }}
          # Shell command to verify the build before pushing.
          # The fix agent clones the target repo, applies fixes, runs this command.
          # Push is aborted if the command exits with a non-zero code.
          # Remove or leave empty to skip the build check.
          BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
          # Optional: shell command to run before BUILD_COMMAND in the fix-agent's clone.
          # Use this to compile workspace packages whose dist/ isn't committed to git.
          # Example: pnpm --filter @artboxes/contracts build
          PREBUILD_COMMAND: ${{ vars.PREBUILD_COMMAND }}
          # Multi-app URLs — set as repository Variables in GitHub Actions settings.
          # Used by ui-agent.config.ts to point each scenario at the right deployed app.
          WEB_URL: ${{ vars.WEB_URL }}
          ARTIST_URL: ${{ vars.ARTIST_URL }}
          PRELAUNCH_URL: ${{ vars.PRELAUNCH_URL }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn
