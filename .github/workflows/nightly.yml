name: Nightly Visual QA

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC every night
  workflow_dispatch:     # allow manual runs from the Actions tab

jobs:
  visual-qa:
    name: Screenshot → Claude Vision → Auto-fix PRs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run DB migration
        run: pnpm migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Debug — check secrets are set
        run: |
          echo "BASE_URL set:            ${{ secrets.BASE_URL != '' }}"
          echo "ANTHROPIC_API_KEY set:   ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "DATABASE_URL set:        ${{ secrets.DATABASE_URL != '' }}"
          echo "UI_FIX_GITHUB_TOKEN set: ${{ secrets.UI_FIX_GITHUB_TOKEN != '' }}"
          echo "REPO_OWNER: ${{ vars.REPO_OWNER }}"
          echo "REPO_NAME:  ${{ vars.REPO_NAME }}"

      - name: Run visual tests + auto-fix
        run: pnpm test:ci
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UI_FIX_GITHUB_TOKEN: ${{ secrets.UI_FIX_GITHUB_TOKEN }}
          REPO_OWNER: ${{ vars.REPO_OWNER }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          REPO_BRANCH: ${{ vars.REPO_BRANCH || 'main' }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn
