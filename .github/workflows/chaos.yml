name: Chaos Mode — Pre-launch Battle Hardening

# ─── ACTIVATION ────────────────────────────────────────────────────────────────
# Enable the schedule block ONLY during the battle-hardening window
# (typically 1-2 days before launch). Disable again afterwards to avoid
# committing directly to main outside of that window.
#
# To enable: uncomment the schedule block below and push to main.
# To disable: comment it back out.
# ───────────────────────────────────────────────────────────────────────────────

on:
  # schedule:
  #   - cron: "*/5 * * * *"   # every 5 minutes — enable pre-launch only
  workflow_dispatch:
    inputs:
      steps:
        description: "Explore steps per route (default: 12)"
        required: false
        default: "12"

jobs:
  chaos:
    name: Autonomous UI exploration + direct-to-main fixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore auth state
        env:
          AUTH_STATE: ${{ secrets.AUTH_STATE }}
        run: |
          if [ -n "$AUTH_STATE" ]; then
            mkdir -p auth
            echo "$AUTH_STATE" | base64 -d > auth/state.json
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run DB migration
        run: pnpm migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Debug — check secrets are set
        run: |
          echo "BASE_URL set:            ${{ secrets.BASE_URL != '' }}"
          echo "ANTHROPIC_API_KEY set:   ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "DATABASE_URL set:        ${{ secrets.DATABASE_URL != '' }}"
          echo "UI_FIX_GITHUB_TOKEN set: ${{ secrets.UI_FIX_GITHUB_TOKEN != '' }}"
          echo "REPO_OWNER: ${{ vars.REPO_OWNER }}"
          echo "REPO_NAME:  ${{ vars.REPO_NAME }}"

      - name: Run chaos tests + auto-fix directly to main
        run: pnpm test:chaos:ci
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UI_FIX_GITHUB_TOKEN: ${{ secrets.UI_FIX_GITHUB_TOKEN }}
          REPO_OWNER: ${{ vars.REPO_OWNER }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          REPO_BRANCH: ${{ vars.REPO_BRANCH || 'main' }}
          CHAOS_STEPS: ${{ github.event.inputs.steps || '12' }}

      - name: Upload chaos screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-screenshots-${{ github.run_id }}
          path: screenshots/chaos/
          retention-days: 7
          if-no-files-found: warn
